<style>
:root {
  --paper: #f5f0e8;
  --paper-dark: #ede7d9;
  --ink: #2c2416;
  --ink-light: #6b5d4a;
  --ink-faint: #a8957e;
  --accent: #c17f4a;
  --accent-soft: #e8c99a;
  --radius: 16px;
  --shadow: 0 2px 20px rgba(44,36,22,0.10);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: #e8e0d0;
  background-image: radial-gradient(ellipse at 20% 20%, rgba(193,127,74,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 80%, rgba(122,158,126,0.06) 0%, transparent 60%);
  font-family: 'Noto Serif SC', serif;
  color: var(--ink);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}
.phone {
  width: 100%; max-width: 420px; min-height: 100vh;
  background: var(--paper);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 27px, rgba(168,149,126,0.10) 28px);
  display: flex; flex-direction: column;
  box-shadow: 0 0 60px rgba(0,0,0,0.15);
  position: relative;
}
.header { padding: 52px 24px 16px; border-bottom: 1.5px solid var(--paper-dark); position: relative; }
.header-date { font-family: 'ZCOOL XiaoWei', serif; font-size: 12px; color: var(--ink-faint); letter-spacing: 0.12em; margin-bottom: 3px; }
.header-title { font-family: 'ZCOOL XiaoWei', serif; font-size: 26px; color: var(--ink); letter-spacing: 0.05em; }
.header-sub { font-size: 12px; color: var(--ink-faint); margin-top: 4px; letter-spacing: 0.04em; }
.location-pill { position: absolute; top: 52px; right: 24px; background: var(--paper-dark); border-radius: 20px; padding: 5px 10px; font-size: 11px; color: var(--ink-light); display: flex; align-items: center; gap: 4px; cursor: pointer; max-width: 130px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
.location-pill:active { opacity: 0.7; }
.tabs { display: flex; padding: 0 20px; border-bottom: 1.5px solid var(--paper-dark); background: var(--paper); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 11px 0; margin-right: 20px; font-size: 13px; color: var(--ink-faint); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1.5px; transition: all 0.2s; letter-spacing: 0.04em; white-space: nowrap; flex-shrink: 0; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.view { display: none; flex: 1; flex-direction: column; overflow-y: auto; padding-bottom: 90px; }
.view.active { display: flex; }
.quick-input { margin: 16px 16px 0; background: #fff; border-radius: var(--radius); border: 1.5px solid var(--paper-dark); box-shadow: var(--shadow); overflow: hidden; }
.quick-input textarea { width: 100%; min-height: 90px; padding: 14px 16px; font-family: 'Noto Serif SC', serif; font-size: 15px; color: var(--ink); background: transparent; border: none; outline: none; resize: none; line-height: 1.8; }
.quick-input textarea::placeholder { color: var(--ink-faint); }
.voice-transcript { padding: 0 16px 10px; display: none; }
.voice-transcript.show { display: block; }
.transcript-label { font-size: 11px; color: var(--ink-faint); margin-bottom: 4px; }
.transcript-body { font-size: 13px; color: var(--ink-light); line-height: 1.6; background: var(--paper); border-radius: 8px; padding: 8px 10px; }
.input-actions { display: flex; align-items: center; padding: 8px 12px; border-top: 1px solid var(--paper-dark); gap: 6px; }
.btn-icon { width: 34px; height: 34px; border-radius: 9px; border: 1.5px solid var(--paper-dark); background: var(--paper); display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; transition: all 0.15s; flex-shrink: 0; }
.btn-icon:active { transform: scale(0.90); background: var(--paper-dark); }
.btn-icon.recording { background: #fee2e2; border-color: #fca5a5; animation: pulseRec 1s infinite; }
@keyframes pulseRec { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.3)} 50%{box-shadow:0 0 0 6px rgba(220,38,38,0)} }
.tag-display { font-size: 11px; color: var(--accent); }
.btn-send { margin-left: auto; padding: 7px 16px; background: var(--ink); color: var(--paper); border: none; border-radius: 9px; font-family: 'Noto Serif SC', serif; font-size: 13px; cursor: pointer; letter-spacing: 0.04em; transition: all 0.15s; white-space: nowrap; }
.btn-send:active { transform: scale(0.96); opacity: 0.85; }
.media-previews { display: flex; gap: 8px; padding: 8px 12px; flex-wrap: wrap; }
.img-thumb { position: relative; width: 64px; height: 64px; border-radius: 8px; overflow: hidden; border: 1.5px solid var(--paper-dark); }
.img-thumb img { width: 100%; height: 100%; object-fit: cover; }
.remove-btn { position: absolute; top: 2px; right: 2px; width: 16px; height: 16px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; cursor: pointer; }
#file-input { display: none; }
.loc-badge { display: none; align-items: center; gap: 3px; font-size: 11px; color: var(--ink-faint); padding: 3px 12px 8px; }
.records-list { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 10px; }
.record-card { background: #fff; border-radius: 12px; border: 1.5px solid var(--paper-dark); overflow: hidden; box-shadow: 0 1px 6px rgba(44,36,22,0.05); animation: slideIn 0.22s ease; }
@keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.record-body { padding: 12px 14px 8px; }
.record-text { font-size: 14px; line-height: 1.8; color: var(--ink); white-space: pre-wrap; word-break: break-all; }
.record-voice { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--paper); border-radius: 8px; margin-top: 6px; cursor: pointer; }
.voice-play-btn { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; color: #fff; flex-shrink: 0; }
.voice-wave { flex: 1; height: 20px; display: flex; align-items: center; gap: 2px; }
.voice-wave span { display: inline-block; width: 3px; background: var(--accent-soft); border-radius: 2px; animation: waveAnim 1.2s ease-in-out infinite; }
.voice-wave span:nth-child(2){animation-delay:0.1s}.voice-wave span:nth-child(3){animation-delay:0.2s}.voice-wave span:nth-child(4){animation-delay:0.3s}.voice-wave span:nth-child(5){animation-delay:0.15s}
@keyframes waveAnim { 0%,100%{height:3px;opacity:0.4} 50%{height:16px;opacity:1} }
.voice-dur { font-size: 11px; color: var(--ink-faint); }
.record-images { display: flex; gap: 5px; padding: 0 10px 10px; flex-wrap: wrap; }
.record-img { width: 72px; height: 72px; border-radius: 7px; object-fit: cover; border: 1.5px solid var(--paper-dark); cursor: pointer; }
.record-meta { display: flex; align-items: center; padding: 7px 14px; border-top: 1px solid var(--paper-dark); gap: 6px; flex-wrap: wrap; }
.record-time { font-size: 11px; color: var(--ink-faint); flex: 1; }
.record-loc { font-size: 11px; color: var(--ink-faint); }
.record-tag { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: var(--paper-dark); color: var(--ink-light); }
.tag-food{background:#fef3e2;color:#b45309}.tag-nature{background:#f0fdf4;color:#166534}.tag-life{background:#eff6ff;color:#1e40af}.tag-thought{background:#faf5ff;color:#6b21a8}
.empty-state { text-align: center; padding: 48px 24px; color: var(--ink-faint); }
.empty-state .icon { font-size: 36px; margin-bottom: 10px; }
.empty-state p { font-size: 13px; line-height: 1.8; }
.section-label { font-size: 11px; color: var(--ink-faint); letter-spacing: 0.08em; padding: 12px 16px 0; }

/* Voice overlay */
.voice-overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(44,36,22,0.72); backdrop-filter: blur(4px); align-items: flex-end; justify-content: center; }
.voice-overlay.open { display: flex; }
.voice-sheet { width: 100%; max-width: 420px; background: var(--paper); border-radius: 24px 24px 0 0; padding: 32px 24px 52px; display: flex; flex-direction: column; align-items: center; gap: 18px; animation: sheetUp 0.3s cubic-bezier(0.34,1.56,0.64,1); }
@keyframes sheetUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.voice-status { font-family: 'ZCOOL XiaoWei', serif; font-size: 18px; color: var(--ink); }
.voice-timer { font-size: 40px; color: var(--accent); font-variant-numeric: tabular-nums; letter-spacing: 0.05em; }
.voice-rings { position: relative; width: 96px; height: 96px; display: flex; align-items: center; justify-content: center; }
.voice-rings::before,.voice-rings::after { content:''; position:absolute; border-radius:50%; border:2px solid var(--accent-soft); animation:ringPulse 1.5s ease-out infinite; }
.voice-rings::before { width:96px;height:96px;animation-delay:0 }
.voice-rings::after { width:72px;height:72px;animation-delay:0.4s }
@keyframes ringPulse { 0%{opacity:0.8;transform:scale(0.8)} 100%{opacity:0;transform:scale(1.2)} }
.voice-mic { width:56px;height:56px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;z-index:1; }
.voice-hint { font-size:12px;color:var(--ink-faint); }
.voice-stop-btn { padding:12px 36px;background:var(--ink);color:var(--paper);border:none;border-radius:30px;font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer; }

/* Diary */
.diary-section { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.diary-header-card { background: var(--ink); border-radius: var(--radius); padding: 22px 20px; color: var(--paper); position: relative; overflow: hidden; }
.diary-header-card::before { content:'';position:absolute;top:-30px;right:-30px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,0.04); }
.diary-date-label { font-size:11px;letter-spacing:0.14em;opacity:0.55;margin-bottom:6px; }
.diary-headline { font-family:'ZCOOL XiaoWei',serif;font-size:20px;line-height:1.4;margin-bottom:10px; }
.diary-stats { display:flex;gap:14px;opacity:0.65;font-size:12px; }
.btn-generate { width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:'ZCOOL XiaoWei',serif;font-size:16px;cursor:pointer;letter-spacing:0.08em;box-shadow:0 4px 16px rgba(193,127,74,0.28);transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px; }
.btn-generate:active { transform:scale(0.98); }
.btn-generate:disabled { opacity:0.6;cursor:not-allowed; }
.diary-content-card { background:#fff;border-radius:var(--radius);border:1.5px solid var(--paper-dark);padding:22px 18px;box-shadow:var(--shadow);min-height:180px; }
.diary-body { font-size:15px;line-height:2;color:var(--ink);white-space:pre-wrap; }
.diary-placeholder { color:var(--ink-faint);font-size:13px;line-height:1.8;text-align:center;padding:36px 0; }
/* 提示词调配面板 */
.prompt-panel { background:#fff; border-radius:var(--radius); border:1.5px solid var(--paper-dark); overflow:hidden; }
.prompt-panel-title { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; cursor:pointer; font-size:13px; font-weight:600; color:var(--ink); user-select:none; }
.prompt-panel-title:active { background:var(--paper-dark); }
.prompt-arrow { font-size:16px; transition:transform 0.25s; color:var(--ink-light); }
.prompt-arrow.open { transform:rotate(180deg); }
.prompt-panel-body { padding:0 14px 14px; display:none; }
.prompt-panel-body.open { display:block; }
.prompt-presets { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:12px; }
.preset-tag { padding:6px 13px; border-radius:20px; border:1.5px solid var(--paper-dark); background:#fff; font-size:12px; color:var(--ink-light); cursor:pointer; transition:all 0.18s; }
.preset-tag:active { transform:scale(0.96); }
.preset-tag.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
.prompt-custom { width:100%; box-sizing:border-box; border:1.5px solid var(--paper-dark); border-radius:10px; padding:10px 12px; font-size:13px; color:var(--ink); background:var(--paper); resize:none; outline:none; line-height:1.7; font-family:inherit; }
.prompt-custom:focus { border-color:var(--accent); }
.prompt-history-label { font-size:11px; color:var(--ink-faint); margin:10px 0 6px; }
.prompt-history-item { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.prompt-history-text { flex:1; font-size:12px; color:var(--ink-light); background:var(--paper); border:1px solid var(--paper-dark); border-radius:8px; padding:5px 10px; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.prompt-history-text:active { background:var(--paper-dark); }
.prompt-history-del { flex-shrink:0; background:none; border:none; color:var(--ink-faint); font-size:13px; cursor:pointer; padding:4px 6px; border-radius:6px; }
.record-del-btn { margin-left:auto; font-size:12px; color:var(--ink-faint); cursor:pointer; padding:2px 6px; border-radius:6px; background:none; border:none; }
.record-del-btn:active { background:#fee2e2; color:#ef4444; }
.hist-section-label { font-size:11px; font-weight:600; color:var(--ink-faint); letter-spacing:0.08em; margin:4px 0 10px; }
.hist-card { background:#fff; border-radius:12px; border:1.5px solid var(--paper-dark); overflow:hidden; box-shadow:0 1px 5px rgba(44,36,22,0.05); }
.hist-card-header { padding:11px 14px 8px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--paper-dark); }
.hist-card-title { font-family:'ZCOOL XiaoWei',serif; font-size:14px; color:var(--ink); }
.hist-card-body { padding:9px 14px 10px; font-size:13px; color:var(--ink-light); line-height:1.7; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.hist-section-label { font-size:11px; font-weight:600; color:var(--ink-faint); letter-spacing:0.08em; margin:4px 0 10px; }
.hist-card { background:#fff; border-radius:12px; border:1.5px solid var(--paper-dark); overflow:hidden; box-shadow:0 1px 5px rgba(44,36,22,0.05); }
.hist-card-header { padding:11px 14px 8px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--paper-dark); }
.hist-card-title { font-family:'ZCOOL XiaoWei',serif; font-size:14px; color:var(--ink); }
.hist-card-body { padding:9px 14px 10px; font-size:13px; color:var(--ink-light); line-height:1.7; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.hist-section-label { font-size:11px; font-weight:600; color:var(--ink-faint); letter-spacing:0.08em; margin:4px 0 10px; }
.hist-card { background:#fff; border-radius:12px; border:1.5px solid var(--paper-dark); overflow:hidden; box-shadow:0 1px 5px rgba(44,36,22,0.05); }
.hist-card-header { padding:11px 14px 8px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--paper-dark); }
.hist-card-title { font-family:'ZCOOL XiaoWei',serif; font-size:14px; color:var(--ink); }
.hist-card-body { padding:9px 14px 10px; font-size:13px; color:var(--ink-light); line-height:1.7; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.prompt-history-label { font-size:11px; color:var(--ink-faint); margin:10px 0 6px; letter-spacing:0.05em; }
.prompt-history-item { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
.prompt-history-text { flex:1; font-size:12px; color:var(--ink-light); background:var(--paper); border:1px solid var(--paper-dark); border-radius:8px; padding:5px 10px; cursor:pointer; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.prompt-history-text:active { background:var(--paper-dark); }
.prompt-history-del { flex-shrink:0; background:none; border:none; color:var(--ink-faint); font-size:13px; cursor:pointer; padding:4px 6px; border-radius:6px; }
.prompt-history-del:active { background:var(--paper-dark); }
.record-del-btn { margin-left:auto; font-size:12px; color:var(--ink-faint); cursor:pointer; padding:2px 6px; border-radius:6px; background:none; border:none; line-height:1; }
.record-del-btn:active { background:#fee2e2; color:#ef4444; }

/* Weekly */
.weekly-section { padding: 16px; display: flex; flex-direction: column; gap: 12px; }
.week-selector { display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-radius:12px;border:1.5px solid var(--paper-dark); }
.week-arrow { width:32px;height:32px;border-radius:8px;background:var(--paper);border:1.5px solid var(--paper-dark);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;transition:all 0.15s; }
.week-arrow:active { background:var(--paper-dark); }
.week-label { font-family:'ZCOOL XiaoWei',serif;font-size:15px;color:var(--ink); }
.week-heatmap { background:#fff;border-radius:12px;border:1.5px solid var(--paper-dark);padding:14px; }
.heatmap-title { font-size:12px;color:var(--ink-faint);margin-bottom:10px;letter-spacing:0.06em; }
.heatmap-grid { display:grid;grid-template-columns:repeat(7,1fr);gap:5px; }
.heatmap-cell { aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;background:var(--paper-dark);transition:all 0.15s; }
.heatmap-cell .dn { font-size:9px;color:var(--ink-faint); }
.heatmap-cell .dd { font-size:12px;font-weight:500;color:var(--ink-light); }
.heatmap-cell.h1{background:#fde8c8}.heatmap-cell.h2{background:#f5c87a}.heatmap-cell.h3{background:#e8a54a}.heatmap-cell.hm{background:var(--accent)}
.heatmap-cell.hm .dn,.heatmap-cell.hm .dd{color:#fff}
.heatmap-cell.tod{box-shadow:0 0 0 2px var(--accent)}
.week-stats-row { display:grid;grid-template-columns:repeat(3,1fr);gap:8px; }
.week-stat-card { background:#fff;border-radius:12px;border:1.5px solid var(--paper-dark);padding:12px;text-align:center; }
.week-stat-num { font-family:'ZCOOL XiaoWei',serif;font-size:24px;color:var(--accent); }
.week-stat-label { font-size:11px;color:var(--ink-faint);margin-top:2px; }
.week-tags-card { background:#fff;border-radius:12px;border:1.5px solid var(--paper-dark);padding:14px; }
.week-tags-title { font-size:12px;color:var(--ink-faint);margin-bottom:10px; }
.tag-bar-row { display:flex;align-items:center;gap:8px;margin-bottom:7px; }
.tag-bar-name { font-size:12px;color:var(--ink-light);width:36px;flex-shrink:0; }
.tag-bar-track { flex:1;height:7px;background:var(--paper-dark);border-radius:4px;overflow:hidden; }
.tag-bar-fill { height:100%;border-radius:4px;transition:width 0.6s ease; }
.tag-bar-cnt { font-size:11px;color:var(--ink-faint);width:16px;text-align:right; }
.btn-weekly { width:100%;padding:14px;background:#2c4a3e;color:#e8f5e2;border:none;border-radius:var(--radius);font-family:'ZCOOL XiaoWei',serif;font-size:16px;cursor:pointer;letter-spacing:0.08em;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px; }
.btn-weekly:active{transform:scale(0.98)}.btn-weekly:disabled{opacity:0.6;cursor:not-allowed}
.weekly-content-card { background:#fff;border-radius:var(--radius);border:1.5px solid var(--paper-dark);padding:22px 18px;box-shadow:var(--shadow);min-height:160px; }

.loading-dots { display:flex;gap:6px;align-items:center;justify-content:center;padding:32px 0; }
.loading-dots span { width:7px;height:7px;border-radius:50%;background:var(--accent-soft);animation:bounce 1s infinite; }
.loading-dots span:nth-child(2){animation-delay:0.15s}.loading-dots span:nth-child(3){animation-delay:0.3s}
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-5px);opacity:1} }

.bottom-nav { position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(245,240,232,0.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1.5px solid var(--paper-dark);display:flex;padding:8px 0 22px;z-index:100; }
.nav-item { flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--ink-faint);transition:color 0.2s;font-size:10px;letter-spacing:0.04em;padding:4px 0; }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:20px;line-height:1; }

.lightbox { display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:999;align-items:center;justify-content:center; }
.lightbox.open { display:flex; }
.lightbox img { max-width:92vw;max-height:85vh;border-radius:10px;object-fit:contain; }
.toast { position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--ink);color:var(--paper);padding:9px 18px;border-radius:20px;font-size:13px;z-index:9999;transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);letter-spacing:0.04em;white-space:nowrap; }
.toast.show { transform:translateX(-50%) translateY(0); }
.cursor { display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:1px;animation:blink 0.8s infinite;vertical-align:text-bottom; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }
</style>
</head>
<body>
<div class="phone">
  <div class="header">
    <div class="header-date" id="headerDate"></div>
    <div class="header-title">随手记</div>
    <div class="header-sub">记录生活的每一个闪光瞬间</div>
    <div class="location-pill" id="locationPill" onclick="fetchLocation()">📍 <span id="locationText">获取位置</span></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="record">今日</div>
    <div class="tab" data-view="diary">AI 日记</div>
    <div class="tab" data-view="weekly">周报</div>
    <div class="tab" data-view="history">历史</div>
  </div>

  <!-- 今日记录 -->
  <div class="view active" id="view-record">
    <div class="quick-input">
      <textarea id="noteInput" placeholder="随手记下此刻…看到的，想到的，听到的"></textarea>
      <div class="voice-transcript" id="voiceTranscript">
        <div class="transcript-label">🎙 语音识别</div>
        <div class="transcript-body" id="transcriptText"></div>
      </div>
      <div id="mediaPreviews" class="media-previews" style="display:none"></div>
      <div class="loc-badge" id="locBadge">📍 <span id="locBadgeText"></span></div>
      <div class="input-actions">
        <div class="btn-icon" onclick="document.getElementById('file-input').click()" title="图片">📷</div>
        <input type="file" id="file-input" accept="image/*" multiple onchange="handleImages(this)">
        <div class="btn-icon" id="voiceBtn" onclick="startVoiceFlow()" title="语音">🎙</div>
        <div class="btn-icon" id="locBtn" onclick="attachLocation()" title="位置">📍</div>
        <div class="btn-icon" onclick="cycleTag()" title="标签">🏷</div>
        <span class="tag-display" id="tagDisplay"></span>
        <button class="btn-send" onclick="addRecord()">记下来</button>
      </div>
    </div>
    <div class="section-label" id="todayLabel"></div>
    <div class="records-list" id="recordsList">
      <div class="empty-state"><div class="icon">✍️</div><p>今天还没有记录<br>把身边有趣的事情记下来吧</p></div>
    </div>
  </div>

  <!-- AI 日记 -->
  <div class="view" id="view-diary">
    <div class="diary-section">
      <div class="diary-header-card">
        <div class="diary-date-label" id="diaryDateLabel">今日日记</div>
        <div class="diary-headline" id="diaryHeadline">记录生活，遇见更好的自己</div>
        <div class="diary-stats">
          <span>📝 <span id="statCount">0</span> 条</span>
          <span>📷 <span id="statPhotos">0</span> 张</span>
          <span>🎙 <span id="statVoice">0</span> 段</span>
        </div>
      </div>
      <!-- 提示词调配区 -->
      <div class="prompt-panel">
        <div class="prompt-panel-title" onclick="togglePromptPanel()">
          <span>🎨 日记风格调配</span>
          <span class="prompt-arrow" id="promptArrow">▾</span>
        </div>
        <div class="prompt-panel-body" id="promptPanelBody">
          <div class="prompt-presets">
            <button class="preset-tag" onclick="selectPreset(this, '重点写今天的心情变化，细腻地描写情绪起伏，帮我看见内心深处的感受。')">😊 心情变化</button>
            <button class="preset-tag" onclick="selectPreset(this, '用夸夸体风格，找出今天所有值得表扬自己的瞬间，让我感受到自己超棒的！')">🌟 夸夸日记</button>
            <button class="preset-tag" onclick="selectPreset(this, '从成长视角出发，挖掘今天经历背后的收获与领悟，激励我继续前进。')">🚀 成长激励</button>
            <button class="preset-tag" onclick="selectPreset(this, '用诗意优美的文学风格书写，语言充满意境，像一篇散文诗。')">🌸 诗意文学</button>
            <button class="preset-tag" onclick="selectPreset(this, '写成给未来自己的一封信，温柔地记录此刻，让未来的我读到时会感动。')">💌 给未来的信</button>
            <button class="preset-tag" onclick="selectPreset(this, '像和好朋友聊天一样，用轻松幽默的口吻写，多一点俏皮感。')">😄 轻松幽默</button>
          </div>
          <div class="prompt-custom-wrap">
            <textarea class="prompt-custom" id="customPrompt" placeholder="或者写下你自己的风格要求，比如：用古风语言写、重点写食物描写…（留空则使用默认风格）" rows="3"></textarea>
          </div>
          <div id="customPromptHistory"></div>
        </div>
      </div>
      <button class="btn-generate" id="generateBtn" onclick="generateDiary()"><span>✨</span><span>AI 生成今日日记</span></button>
      <div class="diary-content-card">
        <div id="diaryContent"><div class="diary-placeholder">点击上方按钮，让 AI 根据今天的记录自动生成日记 ✨</div></div>
      </div>
    </div>
  </div>

  <!-- 周报 -->
  <div class="view" id="view-weekly">
    <div class="diary-section">
      <div class="diary-header-card">
        <div class="diary-date-label" id="weeklyDateLabel">本周周报</div>
        <div class="diary-headline" id="weeklyHeadline">回顾这一周，遇见更好的自己</div>
        <div class="diary-stats">
          <span>📝 <span id="wkTotal">0</span> 条记录</span>
          <span>📅 <span id="wkDays">0</span> 天活跃</span>
        </div>
      </div>
      <button class="btn-generate" id="weeklyBtn" onclick="generateWeekly()"><span>📋</span><span>AI 生成本周周报</span></button>
      <div class="diary-content-card">
        <div id="weeklyContent"><div class="diary-placeholder">点击上方按钮，让 AI 总结你这一周的生活 🌿</div></div>
      </div>
    </div>
  </div>

  <!-- 历史 -->
  <div class="view" id="view-history">
    <div style="padding:12px 16px 0;display:flex;flex-direction:column;gap:10px" id="historyList"></div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active" data-view="record"><div class="nav-icon">📋</div><span>记录</span></div>
    <div class="nav-item" data-view="diary"><div class="nav-icon">✨</div><span>日记</span></div>
    <div class="nav-item" data-view="weekly"><div class="nav-icon">📊</div><span>周报</span></div>
    <div class="nav-item" data-view="history"><div class="nav-icon">📚</div><span>历史</span></div>
  </div>
</div>

<!-- 录音 overlay -->
<div class="voice-overlay" id="voiceOverlay">
  <div class="voice-sheet">
    <div class="voice-status">正在录音…</div>
    <div class="voice-rings"><div class="voice-mic">🎙</div></div>
    <div class="voice-timer" id="voiceTimer">00:00</div>
    <div class="voice-hint">说完后点击完成</div>
    <button class="voice-stop-btn" onclick="stopVoice()">完成录音</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""></div>
<div class="toast" id="toast"></div>

<script>
let records = [];
let pendingImages = [];
let pendingLocation = null;
let pendingVoice = null;
let currentTag = '';
const tagList = ['','美食','自然','生活','随想','工作'];
let tagIndex = 0;
const tagStyles = {'':'','美食':'tag-food','自然':'tag-nature','生活':'tag-life','随想':'tag-thought'};
const tagColors = {'美食':'#f59e0b','自然':'#22c55e','生活':'#3b82f6','随想':'#a855f7','工作':'#ef4444'};
let mediaRecorder = null;
let audioChunks = [];
let voiceTimerInt = null;
let voiceSecs = 0;
// ══ 埋点工具函数 ══
// ── 埋点工具函数 ──
function track(eventName, props) {
  try {
    if (window.clarity) window.clarity('event', eventName);
    // 打印到控制台方便调试
    console.log('[track]', eventName, props || '');
  } catch(e) {}
}

// 记录页面进入时间，用于计算停留时长
let _pageEnterTime = Date.now();
let _currentTab = 'record';

function init() {
  loadRecords();
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent = `${now.getFullYear()} 年 ${now.getMonth()+1} 月 ${now.getDate()} 日  星期${wd[now.getDay()]}`;
  updateTodayLabel(); renderRecords(); renderHistory(); updateDiaryStats(); renderWeekly();
  tryAutoLocation();

  // 埋点：页面访问
  track('page_view', { time: new Date().toISOString() });

  // 埋点：页面离开时记录停留时长
  window.addEventListener('beforeunload', () => {
    const stay = Math.round((Date.now() - _pageEnterTime) / 1000);
    track('page_leave', { stay_seconds: stay });
  });
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      const stay = Math.round((Date.now() - _pageEnterTime) / 1000);
      track('page_leave', { stay_seconds: stay });
    } else {
      _pageEnterTime = Date.now();
      track('page_view', { resume: true });
    }
  });
}

function loadRecords() {
  try { records = JSON.parse(localStorage.getItem('ssj_v2')||'[]'); } catch { records=[]; }
}
function saveRecords() { try { localStorage.setItem('ssj_v2', JSON.stringify(records.slice(-150))); } catch {} }


function todayKey() { return fmtDate(new Date()); }
function offsetKey(n) { const d=new Date(); d.setDate(d.getDate()+n); return fmtDate(d); }
function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function fmtTime() { const d=new Date(); return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; }
function fmtDur(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }

// ── Location ──
async function tryAutoLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(async p => {
    document.getElementById('locationText').textContent = await revGeo(p.coords.latitude, p.coords.longitude);
  }, () => { document.getElementById('locationText').textContent = '东京 · 晴'; });
}
function fetchLocation() {
  document.getElementById('locationText').textContent = '定位中…';
  if (!navigator.geolocation) { showToast('不支持定位'); return; }
  navigator.geolocation.getCurrentPosition(async p => {
    const n = await revGeo(p.coords.latitude, p.coords.longitude);
    document.getElementById('locationText').textContent = n;
    showToast(`已定位：${n}`);
  }, () => showToast('定位失败'));
}
async function revGeo(lat, lon) {
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=zh`);
    const d = await r.json(); const a = d.address;
    return a.suburb||a.neighbourhood||a.city_district||a.city||a.county||'当前位置';
  } catch { return '当前位置'; }
}
function attachLocation() {
  if (!navigator.geolocation) { showToast('不支持定位'); return; }
  showToast('正在获取位置…');
  navigator.geolocation.getCurrentPosition(async p => {
    const n = await revGeo(p.coords.latitude, p.coords.longitude);
    pendingLocation = n;
    document.getElementById('locBadge').style.display = 'flex';
    document.getElementById('locBadgeText').textContent = n;
    document.getElementById('locBtn').style.background = '#ecfdf5';
    // 埋点：位置附加
    track('location_attach');
    showToast(`📍 ${n}`);
  }, () => {
    // Demo fallback
    const demo = ['新宿区','涩谷区','品川区','港区','中目黑'];
    pendingLocation = demo[Math.floor(Math.random()*demo.length)];
    document.getElementById('locBadge').style.display = 'flex';
    document.getElementById('locBadgeText').textContent = pendingLocation + '（示例）';
    document.getElementById('locBtn').style.background = '#ecfdf5';
    showToast(`📍 ${pendingLocation}（示例）`);
  });
}

// ── Images ──
function handleImages(input) {
  Array.from(input.files).forEach(f => {
    const r = new FileReader();
    r.onload = e => { pendingImages.push(e.target.result); renderPreviews(); };
    r.readAsDataURL(f);
  });
  // 埋点：图片上传
  track('photo_add', { count: input.files.length });
  input.value = '';
}
function renderPreviews() {
  const c = document.getElementById('mediaPreviews');
  if (!pendingImages.length && !pendingVoice) { c.style.display='none'; return; }
  c.style.display = 'flex';
  let h = pendingImages.map((img,i)=>`<div class="img-thumb"><img src="${img}" alt=""><div class="remove-btn" onclick="rmImg(${i})">×</div></div>`).join('');
  if (pendingVoice) h += `<div class="img-thumb" style="background:#fef3e2;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:2px"><span style="font-size:18px">🎙</span><span style="font-size:9px;color:var(--ink-faint)">${fmtDur(pendingVoice.duration)}</span><div class="remove-btn" onclick="rmVoice()">×</div></div>`;
  c.innerHTML = h;
}
function rmImg(i) { pendingImages.splice(i,1); renderPreviews(); }
function rmVoice() { pendingVoice=null; document.getElementById('voiceTranscript').classList.remove('show'); renderPreviews(); }

// ── Tags ──
function cycleTag() {
  tagIndex = (tagIndex+1)%tagList.length;
  currentTag = tagList[tagIndex];
  document.getElementById('tagDisplay').textContent = currentTag ? `#${currentTag}` : '';
}

// ── Voice ──
async function startVoiceFlow() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[]; voiceSecs=0;
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      const blob = new Blob(audioChunks,{type:'audio/webm'});
      const url = URL.createObjectURL(blob);
      pendingVoice = {duration:voiceSecs, blob, url};
      // 埋点：语音录制
      track('voice_record', { duration_seconds: voiceSecs });
      // 埋点：语音录制完成
      track('voice_record', { duration_seconds: voiceSecs });
      showTranscript('语音已录制 · 部署后可接 Whisper API 实现实时转文字');
      renderPreviews();
    };
    mediaRecorder.start();
    openVoiceUI();
  } catch {
    // Demo mode without mic
    voiceSecs=0; openVoiceUI();
    setTimeout(() => {
      stopVoice();
      pendingVoice = {duration:voiceSecs, blob:null, url:null};
      showTranscript('这里是语音转文字的效果演示，实际部署后对接 Whisper API 即可实时转录');
      renderPreviews();
    }, 4000);
  }
}

function openVoiceUI() {
  document.getElementById('voiceBtn').classList.add('recording');
  document.getElementById('voiceOverlay').classList.add('open');
  voiceTimerInt = setInterval(() => {
    voiceSecs++;
    const m=String(Math.floor(voiceSecs/60)).padStart(2,'0'), s=String(voiceSecs%60).padStart(2,'0');
    document.getElementById('voiceTimer').textContent = `${m}:${s}`;
  }, 1000);
}

function stopVoice() {
  clearInterval(voiceTimerInt);
  document.getElementById('voiceBtn').classList.remove('recording');
  document.getElementById('voiceOverlay').classList.remove('open');
  document.getElementById('voiceTimer').textContent = '00:00';
  if (mediaRecorder && mediaRecorder.state==='recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t=>t.stop());
  }
}

function showTranscript(text) {
  document.getElementById('transcriptText').textContent = text;
  document.getElementById('voiceTranscript').classList.add('show');
  const ta = document.getElementById('noteInput');
  if (!ta.value) ta.value = text;
}

// ── Add Record ──
function addRecord() {
  const text = document.getElementById('noteInput').value.trim();
  if (!text && !pendingImages.length && !pendingVoice) { showToast('写点什么再记下来～'); return; }
  const newRec = {
    id: Date.now(), text,
    images: [...pendingImages],
    voice: pendingVoice ? {duration:pendingVoice.duration, url:pendingVoice.url} : null,
    tag: currentTag, time: fmtTime(), date: todayKey(), location: pendingLocation||''
  };
  records.unshift(newRec);
  saveRecords();
  // 埋点：记录行为
  track('record_add', {
    has_text: !!text,
    has_image: pendingImages.length > 0,
    has_voice: !!pendingVoice,
    has_location: !!pendingLocation,
    tag: currentTag || '无标签',
    today_total: records.filter(r=>r.date===todayKey()).length
  });
  document.getElementById('noteInput').value = '';
  pendingImages=[]; pendingVoice=null; pendingLocation=null;
  renderPreviews();
  tagIndex=0; currentTag='';
  document.getElementById('tagDisplay').textContent='';
  document.getElementById('voiceTranscript').classList.remove('show');
  document.getElementById('locBadge').style.display='none';
  document.getElementById('locBtn').style.background='';
  renderRecords(); updateDiaryStats(); updateTodayLabel(); renderWeekly();
  showToast('记下来了 ✓');
}

// ── Render ──
function updateTodayLabel() {
  const c = records.filter(r=>r.date===todayKey()).length;
  document.getElementById('todayLabel').textContent = c ? `今天已记录 ${c} 条` : '';
}

function renderRecords() {
  const el = document.getElementById('recordsList');
  const today = records.filter(r=>r.date===todayKey());
  if (!today.length) { el.innerHTML=`<div class="empty-state"><div class="icon">✍️</div><p>今天还没有记录<br>把身边有趣的事情记下来吧</p></div>`; return; }
  el.innerHTML = today.map(r=>`
    <div class="record-card">
      <div class="record-body">
        ${r.text?`<div class="record-text">${esc(r.text)}</div>`:''}
        ${r.voice?`<div class="record-voice" onclick="playVoice('${r.voice.url||''}')">
          <div class="voice-play-btn">▶</div>
          <div class="voice-wave"><span></span><span></span><span></span><span></span><span></span></div>
          <span class="voice-dur">${fmtDur(r.voice.duration)}</span>
        </div>`:''}
      </div>
      ${r.images&&r.images.length?`<div class="record-images">${r.images.map(img=>`<img class="record-img" src="${img}" onclick="openLightbox(this.src)" alt="">`).join('')}</div>`:''}
      <div class="record-meta">
        <span class="record-time">${r.time}</span>
        ${r.location?`<span class="record-loc">📍 ${esc(r.location)}</span>`:''}
        ${r.tag?`<span class="record-tag ${tagStyles[r.tag]||''}">#${r.tag}</span>`:''}
        <span class="record-del-btn" onclick="deleteRecord(${r.id})" title="删除">✕</span>
      </div>
    </div>`).join('');
}

function deleteRecord(id) {
  if (!confirm('确认删除这条记录？')) return;
  records = records.filter(r => r.id !== id);
  saveRecords();
  renderRecords(); updateDiaryStats(); updateTodayLabel(); renderWeekly();
  showToast('已删除 ✓');
}

function deleteRecord(id) {
  if (!confirm('确认删除这条记录？')) return;
  records = records.filter(r => r.id !== id);
  saveRecords();
  renderRecords(); updateDiaryStats(); updateTodayLabel(); renderWeekly();
  showToast('已删除 ✓');
}

function playVoice(url) { if(!url){showToast('示例语音无法播放'); return;} new Audio(url).play(); }

// ── Diary ──
function updateDiaryStats() {
  const r = records.filter(r=>r.date===todayKey());
  document.getElementById('statCount').textContent = r.length;
  document.getElementById('statPhotos').textContent = r.reduce((s,x)=>s+(x.images||[]).length,0);
  document.getElementById('statVoice').textContent = r.filter(x=>x.voice).length;
  const d=new Date();
  document.getElementById('diaryDateLabel').textContent = `${d.getMonth()+1} 月 ${d.getDate()} 日 · 今日日记`;
}

// ── 自定义提示词历史 ──
function saveCustomPrompt(text) {
  let list = loadCustomPrompts();
  list = list.filter(p => p !== text);
  list.unshift(text);
  list = list.slice(0, 10);
  try { localStorage.setItem('ssj_prompts', JSON.stringify(list)); } catch {}
  renderCustomPrompts();
}

function loadCustomPrompts() {
  try { return JSON.parse(localStorage.getItem('ssj_prompts') || '[]'); } catch { return []; }
}

function deleteCustomPrompt(index) {
  let list = loadCustomPrompts();
  list.splice(index, 1);
  try { localStorage.setItem('ssj_prompts', JSON.stringify(list)); } catch {}
  renderCustomPrompts();
}

function renderCustomPrompts() {
  const container = document.getElementById('customPromptHistory');
  if (!container) return;
  const list = loadCustomPrompts();
  if (!list.length) { container.innerHTML = ''; return; }
  container.innerHTML = `<div class="prompt-history-label">我的历史风格</div>` +
    list.map((text, i) => `
      <div class="prompt-history-item">
        <span class="prompt-history-text" onclick="applyHistoryPrompt('${text.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${esc(text.length > 28 ? text.slice(0,28)+'…' : text)}</span>
        <button class="prompt-history-del" onclick="deleteCustomPrompt(${i})">✕</button>
      </div>
    `).join('');
}

function applyHistoryPrompt(text) {
  document.querySelectorAll('.preset-tag').forEach(b => b.classList.remove('selected'));
  document.getElementById('customPrompt').value = text;
}

function togglePromptPanel() {
  const body = document.getElementById('promptPanelBody');
  const arrow = document.getElementById('promptArrow');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
  if (!isOpen) renderCustomPrompts();
}

function selectPreset(btn, text) {
  // 切换选中状态
  const allBtns = document.querySelectorAll('.preset-tag');
  const isAlreadySelected = btn.classList.contains('selected');
  allBtns.forEach(b => b.classList.remove('selected'));
  const textarea = document.getElementById('customPrompt');
  if (isAlreadySelected) {
    // 再次点击取消选中，清空textarea
    textarea.value = '';
  } else {
    btn.classList.add('selected');
    textarea.value = text;
  }
}

// ── Weekly ──
function getWeek(offset) {
  const now = new Date(), day = now.getDay() || 7;
  const mon = new Date(now); mon.setDate(now.getDate() - day + 1 + offset * 7);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  return { mon, sun };
}

function renderWeekly() {
  const { mon, sun } = getWeek(0);
  const wRecs = records.filter(r => r.date >= fmtDate(mon) && r.date <= fmtDate(sun));
  const active = new Set(wRecs.map(r => r.date)).size;
  document.getElementById('wkTotal').textContent = wRecs.length;
  document.getElementById('wkDays').textContent = active;
  document.getElementById('weeklyDateLabel').textContent =
    `${mon.getMonth()+1}/${mon.getDate()} – ${sun.getMonth()+1}/${sun.getDate()} · 本周周报`;
}

  const prompt = `以下是我这一周的随手记录：\n\n${sum}\n\n请用温暖轻松的文字生成本周生活周报：1-2句概括整体基调，2-3个印象深刻瞬间各2-3句，末尾一句对下周的期待。200-300字，有生活感，直接输出正文。`;

  await streamGen(prompt, el, () => {

    track('ai_weekly_done', { cost_seconds: Math.round((Date.now()-_weeklyStart)/1000) });

}

// ── Stream Generate（通过 Cloudflare Worker 代理）──
const PROXY_URL = 'https://deepseek-proxy.yangmanqi2104201431.workers.dev';

async function streamGen(prompt, containerEl, onDone, fallback) {
  try {
    const resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'deepseek-chat',
        max_tokens: 1000,
        stream: true,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    containerEl.innerHTML = '<div class="diary-body" id="streamBody"><span class="cursor"></span></div>';
    const bodyEl = document.getElementById('streamBody');
    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let full = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      for (const line of dec.decode(value).split('\n')) {
        if (!line.startsWith('data: ')) continue;
        const d = line.slice(6).trim();
        if (d === '[DONE]') break;
        try {
          const e = JSON.parse(d);
          const delta = e.choices?.[0]?.delta?.content;
          if (delta) { full += delta; bodyEl.innerHTML = esc(full) + '<span class="cursor"></span>'; }
        } catch {}
      }
    }
    bodyEl.innerHTML = esc(full);
    onDone();
  } catch (err) {
    console.error('API error:', err);
    containerEl.innerHTML = `<div class="diary-body">${esc(fallback)}</div>`;
    showToast('API 未连通，已显示示例内容');
    onDone();
  }
}

function saveAiEntry(type, dateLabel, content) {
  let list = loadAiEntries();
  list = list.filter(e => !(e.type === type && e.dateLabel === dateLabel));
  list.unshift({ id: Date.now(), type, dateLabel, content, savedAt: new Date().toLocaleString('zh-CN') });
  list = list.slice(0, 60);
  try { localStorage.setItem('ssj_ai_entries', JSON.stringify(list)); } catch {}
}
function loadAiEntries() {
  try { return JSON.parse(localStorage.getItem('ssj_ai_entries') || '[]'); } catch { return []; }
}
function deleteAiEntry(id) {
  let list = loadAiEntries().filter(e => e.id !== id);
  try { localStorage.setItem('ssj_ai_entries', JSON.stringify(list)); } catch {}

  showToast('已删除 ✓');
}

function renderHistory(){
  const el=document.getElementById('historyList');
  const byDate={};
  records.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r);});
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const aiEntries=loadAiEntries();
  if(!dates.length&&!aiEntries.length){el.innerHTML='<div class="empty-state"><div class="icon">📚</div><p>还没有历史记录</p></div>';return;}
  let out='';
  if(dates.length){out+='<div class="hist-section-label">📝 随手记录</div>';out+=dates.map(date=>{const recs=byDate[date],[,m,d]=date.split('-');const label=parseInt(m)+'月'+parseInt(d)+'日';const excerpt=recs.map(r=>r.text).filter(Boolean).join(' · ').slice(0,65);const hasV=recs.some(r=>r.voice),hasI=recs.some(r=>r.images&&r.images.length);return '<div class="hist-card"><div class="hist-card-header"><span class="hist-card-title">'+label+'</span><span style="display:flex;gap:6px;align-items:center">'+(hasV?'<span style="font-size:12px">🎙</span>':'')+(hasI?'<span style="font-size:12px">📷</span>':'')+'<span style="font-size:11px;color:var(--ink-faint)">'+recs.length+' 条</span></span></div><div class="hist-card-body">'+esc(excerpt||'（图片或语音记录）')+'</div></div>';}).join('');}
  if(aiEntries.length){out+='<div class="hist-section-label" style="margin-top:18px">✨ AI 日记 & 周报</div>';out+=aiEntries.map(entry=>{const icon=entry.type==='diary'?'📖':'📋';const tl=entry.type==='diary'?'日记':'周报';const preview=(entry.content||'').replace(/\n/g,' ').slice(0,80);return '<div class="hist-card"><div class="hist-card-header"><span class="hist-card-title">'+icon+' '+entry.dateLabel+' · '+tl+'</span><button class="record-del-btn" onclick="deleteAiEntry('+entry.id+')" title="删除">✕</button></div><div class="hist-card-body">'+esc(preview)+'…</div><div style="padding:0 14px 10px;font-size:11px;color:var(--ink-faint)">'+entry.savedAt+'</div></div>';}).join('');}
  el.innerHTML=out;
}

function switchView(v) {
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
